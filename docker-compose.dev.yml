services:
  postgres-dev:
    image: postgres:16
    container_name: kvota-postgres-dev
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: kvota_dev
      POSTGRES_USER: kvota
      POSTGRES_PASSWORD: devpassword
    volumes:
      - kvota_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kvota"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  kvota_pg_data:
