[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -v --tb=short --ignore=tests/test_logistics_service.py
markers =
    integration: marks tests that require a real database connection (skipped when DATABASE_URL is unset)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
