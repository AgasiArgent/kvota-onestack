version: '3.8'

services:
  onestack:
    build: .
    container_name: kvota-onestack
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - APP_SECRET=${APP_SECRET}
      - DEBUG=false
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-}
      - ADMIN_TELEGRAM_CHAT_ID=${ADMIN_TELEGRAM_CHAT_ID:-}
      - ADMIN_TELEGRAM_CHAT_IDS=${ADMIN_TELEGRAM_CHAT_IDS:-}
      - DADATA_API_KEY=${DADATA_API_KEY:-}
      - HERE_API_KEY=${HERE_API_KEY:-}
      - CLICKUP_API_KEY=${CLICKUP_API_KEY:-}
      - CLICKUP_BUG_LIST_ID=${CLICKUP_BUG_LIST_ID:-}
      - CRON_SECRET=${CRON_SECRET:-}
      - APP_BASE_URL=${APP_BASE_URL:-https://kvotaflow.ru}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - TZ=Europe/Moscow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kvota-network

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_APP_BASE_URL=${FRONTEND_BASE_URL:-https://app.kvotaflow.ru}
        - NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-kvota_error_bot}
    container_name: kvota-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PYTHON_API_URL=http://kvota-onestack:5001
      - NEXT_PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-kvota_error_bot}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - ADMIN_TELEGRAM_CHAT_ID=${ADMIN_TELEGRAM_CHAT_ID:-}
      - ADMIN_TELEGRAM_CHAT_IDS=${ADMIN_TELEGRAM_CHAT_IDS:-}
      - DADATA_API_KEY=${DADATA_API_KEY:-}
      - TZ=Europe/Moscow
    depends_on:
      - onestack
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kvota-network

networks:
  kvota-network:
    driver: bridge
