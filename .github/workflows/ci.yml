name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Install Playwright Chromium
        # KP Builder PDF tests (tests/services/test_kp_export_render.py) launch
        # headless Chromium via Playwright. The pip package alone is not enough
        # — the browser binary is a separate download. Without this step those
        # tests skip via the file-level skipif guard, which would silently hide
        # render regressions in CI.
        run: python -m playwright install chromium

      - name: Schema-drift lint
        # Verifies every supabase.table('X').select('a, b') in services/ + api/ matches
        # the committed frontend/src/shared/types/database.types.ts snapshot.
        # NOTE: db:types regeneration requires SSH to beget-kvota and runs locally
        # before commit (see feedback_regen_types_before_schema_drop). CI only
        # validates the committed schema snapshot against current queries.
        run: python3 tools/check_select_columns.py

      - name: Supabase write-type bypass lint
        # Bans `as Record<string, ...>` casts on .update/.insert/.upsert args in
        # frontend/src/. Background: this antipattern shipped МОЗ-82 plus two
        # other silent-failure bugs (vat_rate, customs_notes, …) by disabling
        # the typed Update<T> contract — frontend wrote to columns that did not
        # exist in the schema, PostgREST returned 42703 silently while the UI
        # showed success toasts. See migrations 310/311 + tool header for context.
        run: python3 tools/check_supabase_write_types.py

      - name: Run tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_SECRET: test-secret
          DEBUG: true
        run: |
          pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run vitest
        working-directory: frontend
        run: npm test -- --run

      - name: Next.js production build (Turbopack)
        working-directory: frontend
        env:
          # Build-time vars — not prod secrets, build just needs them defined so
          # imports don't fail. Real values are injected by the VPS build.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-time-placeholder
          NEXT_PUBLIC_APP_BASE_URL: https://app.kvotaflow.ru
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: kvota_error_bot
        run: npm run build
