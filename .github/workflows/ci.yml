name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_SECRET: test-secret
          DEBUG: true
        run: |
          pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run vitest
        working-directory: frontend
        run: npm test -- --run

      - name: Regenerate journey manifest
        working-directory: frontend
        run: npm run journey:build

      - name: Assert journey manifest is not stale
        # Req 1.3 — committed manifest must match what the build produces.
        # If this fails, run `cd frontend && npm run journey:build` locally and
        # commit the regenerated `frontend/public/journey-manifest.json`.
        working-directory: frontend
        run: git diff --exit-code public/journey-manifest.json

      - name: Next.js production build (Turbopack)
        working-directory: frontend
        env:
          # Build-time vars — not prod secrets, build just needs them defined so
          # imports don't fail. Real values are injected by the VPS build.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-time-placeholder
          NEXT_PUBLIC_APP_BASE_URL: https://app.kvotaflow.ru
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: kvota_error_bot
        run: npm run build
