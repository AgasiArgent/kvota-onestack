name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /root/onestack
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
            bash scripts/apply-migrations.sh

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          script: |
            echo "Waiting for containers to start..."
            sleep 15
            BACKEND_STATUS=$(docker inspect --format='{{.State.Health.Status}}' kvota-onestack 2>/dev/null || echo "unknown")
            echo "kvota-onestack health: $BACKEND_STATUS"
            FRONTEND_STATUS=$(docker inspect --format='{{.State.Health.Status}}' kvota-frontend 2>/dev/null || echo "unknown")
            echo "kvota-frontend health: $FRONTEND_STATUS"
            if [ "$BACKEND_STATUS" != "healthy" ]; then
              echo "Backend not healthy, waiting 30 more seconds..."
              sleep 30
              BACKEND_STATUS=$(docker inspect --format='{{.State.Health.Status}}' kvota-onestack 2>/dev/null || echo "unknown")
              echo "kvota-onestack health after retry: $BACKEND_STATUS"
            fi
            if [ "$FRONTEND_STATUS" != "healthy" ]; then
              echo "Frontend not healthy, waiting 30 more seconds..."
              sleep 30
              FRONTEND_STATUS=$(docker inspect --format='{{.State.Health.Status}}' kvota-frontend 2>/dev/null || echo "unknown")
              echo "kvota-frontend health after retry: $FRONTEND_STATUS"
            fi
            if [ "$BACKEND_STATUS" != "healthy" ]; then
              echo "::error::Backend kvota-onestack is not healthy: $BACKEND_STATUS"
              docker logs kvota-onestack --tail 20 || true
              exit 1
            fi
            if [ "$FRONTEND_STATUS" != "healthy" ]; then
              echo "::warning::Frontend kvota-frontend is not healthy: $FRONTEND_STATUS"
              docker logs kvota-frontend --tail 20 || true
            fi
            echo "Deployment verified (backend: $BACKEND_STATUS, frontend: $FRONTEND_STATUS)"
