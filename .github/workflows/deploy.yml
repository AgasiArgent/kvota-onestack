name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /root/onestack
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
            bash scripts/apply-migrations.sh

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            echo "Waiting for containers to start..."
            sleep 15
            for CONTAINER in kvota-onestack kvota-frontend; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER 2>/dev/null || echo "unknown")
              echo "$CONTAINER health: $STATUS"
              if [ "$STATUS" != "healthy" ]; then
                echo "$CONTAINER not healthy, waiting 30 more seconds..."
                sleep 30
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER 2>/dev/null || echo "unknown")
                echo "$CONTAINER health after retry: $STATUS"
              fi
              if [ "$STATUS" != "healthy" ]; then
                echo "::warning::Container $CONTAINER is not healthy: $STATUS"
                docker logs $CONTAINER --tail 20
              else
                echo "$CONTAINER verified healthy"
              fi
            done
            # Backend must be healthy for deploy to succeed
            BACKEND=$(docker inspect --format='{{.State.Health.Status}}' kvota-onestack 2>/dev/null || echo "unknown")
            if [ "$BACKEND" != "healthy" ]; then
              echo "::error::Backend kvota-onestack is not healthy"
              exit 1
            fi
            echo "Deployment verified"
